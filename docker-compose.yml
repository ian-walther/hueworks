services:
  hueworks:
    build:
      context: .
    container_name: hueworks
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE must be set}
      PHX_HOST: ${PHX_HOST:-localhost}
      PHX_SCHEME: ${PHX_SCHEME:-http}
      PHX_URL_PORT: ${PHX_URL_PORT:-}
      PORT: "4000"
      DATABASE_PATH: /data/hueworks.db
      DATABASE_BACKUP_DIR: /data/backups
      DATABASE_BACKUP_RETENTION: ${DATABASE_BACKUP_RETENTION:-5}
      POOL_SIZE: ${POOL_SIZE:-5}
      ADVANCED_DEBUG_LOGGING: ${ADVANCED_DEBUG_LOGGING:-false}
      HOMEKIT_RUNTIME_ENABLED: ${HOMEKIT_RUNTIME_ENABLED:-false}
      HOMEKIT_DATA_PATH: ${HOMEKIT_DATA_PATH:-/data/homekit}
      HOMEKIT_PORT: ${HOMEKIT_PORT:-51827}
      HOMEKIT_MDNS_HOST: ${HOMEKIT_MDNS_HOST:-hueworks}
      CREDENTIALS_ROOT: /credentials
    volumes:
      - ./data:/data
      - ./credentials:/credentials
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
